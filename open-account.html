<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Open an Account | Royal Bank</title>

<link rel="stylesheet" href="css/open-account.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="container">

<div class="logo">

<img src="assets/logo.png" alt="Royal Bank">

<h2>
<span class="blue">RBC</span>
<span class="yellow">Royal Bank</span>
</h2>

</div>

<a href="index.html" class="back-btn">

<i class="fas fa-arrow-left"></i>

Back to Home

</a>

</div>

</header>

<section class="open-account">

<div class="container">

<div class="card">

<h1>Open Your Bank Account</h1>

<p>

Complete the form below to create your Royal Bank account.

</p>

<form id="openAccountForm">

<div class="grid">

<div class="form-group">

<label>First Name</label>

<input
type="text"
id="firstname"
required>

</div>

<div class="form-group">

<label>Last Name</label>

<input
type="text"
id="lastname"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="tel"
id="phone"
required>

</div>

<div class="form-group">

<label>Date of Birth</label>

<input
type="date"
id="birthdate"
required>

</div>

<div class="form-group">

<label>Gender</label>

<select id="gender" required>

<option value="">Select</option>

<option>Male</option>

<option>Female</option>

</select>

</div>

<div class="form-group">

<label>Nationality</label>

<input
type="text"
id="nationality"
required>

</div>

<div class="form-group">

<label>Profession</label>

<input
type="text"
id="profession"
required>

</div>

<div class="form-group">

<label>Country</label>

<input
type="text"
id="country"
required>

</div>

<div class="form-group">

<label>City</label>

<input
type="text"
id="city"
required>

</div>

<div class="form-group full">

<label>Residential Address</label>

<input
type="text"
id="address"
required>

</div>

<div class="form-group">

<label>Account Type</label>

<select id="accountType" required>

<option value="">Select</option>

<option>Checking Account</option>

<option>Savings Account</option>

<option>Business Account</option>

<option>Premium Account</option>

</select>

</div>

<div class="form-group">

<label>Currency</label>

<select id="currency" required>

<option>CAD</option>

<option>USD</option>

<option>EUR</option>

</select>

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
id="password"
required>

</div>

<div class="form-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
required>

</div>

</div>

<div class="check">

<label>

<input
type="checkbox"
id="accept"
required>

I accept the Royal Bank Terms and Conditions.

</label>

</div>

<button
type="submit"
class="submit-btn">

Create My Account

</button>

</form>

</div>

</div>

</section>

<script src="js/open-account.js"></script>

</body>

</html>
