<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Royal Bank Canada | Customers</title>

<link rel="stylesheet" href="css/admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<header>

<button class="logout-btn" onclick="logout()">
<i class="fas fa-right-from-bracket"></i>
Logout
</button>

<img src="logo.png"
class="logo"
alt="Royal Bank Canada Logo">

<h1>Royal Bank Canada</h1>

<h2>Customer Management</h2>

</header>

<div class="toolbar">

<div class="search-box">

<i class="fas fa-search"></i>

<input
type="text"
id="search"
placeholder="Search customer, phone, account or access code...">

</div>

</div>

<table class="customer-table">

<thead>

<tr>

<th>Customer ID</th>

<th>Name</th>

<th>Phone</th>

<th>Access Code</th>

<th>Account</th>

<th>Balance</th>

<th>Status</th>

<th style="width:320px;">Actions</th>

</tr>

</thead>

<tbody id="customerTable">

<!-- admin.js ajoutera les clients ici -->

</tbody>

</table>

</div>

<!-- ===========================
RECHARGE SEBPAY
=========================== -->

<div id="rechargeModal" class="modal">

<div class="modal-content">

<span class="close"
onclick="closeRecharge()">&times;</span>

<h2>Recharge Customer Account</h2>

<p>

Select Mobile Money information.

</p>

<form id="rechargeForm">

<div class="form-group">

<label>Country</label>

<select id="countrySelect" required>

<option value="">

Select Country

</option>

</select>

</div>

<div class="form-group">

<label>Mobile Operator</label>

<select
id="mobileOperator"
required
disabled>

<option value="">

Select Country First

</option>

</select>

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="tel"
id="phoneNumber"
placeholder="Mobile Money Number"
required
disabled>

</div>

<div class="form-group">

<label>Amount</label>

<input
type="number"
id="depositAmount"
placeholder="Amount"
min="1"
required>

</div>

<button
type="submit"
class="btn-primary">

Continue

</button>

</form>

</div>

</div>
<!--==============================
PAYMENT STATUS
==============================-->

<div id="paymentStatusModal" class="modal">

<div class="modal-content" style="text-align:center;">

<i id="paymentStatusIcon"
class="fas fa-spinner fa-spin"
style="font-size:70px;margin-bottom:20px;"></i>

<h2 id="paymentStatusTitle">
Processing...
</h2>

<p id="paymentStatusMessage">
Please wait...
</p>

<button
id="paymentStatusButton"
class="btn-primary"
style="display:none;">
OK
</button>

</div>

</div>
  
<script src="js/admin.js"></script>

</body>

</html>
