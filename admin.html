<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Royal Bank Canada | Customers</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="container">

   <header>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

    <img src="logo.png" class="logo">

    <h1>Royal Bank Canada</h1>

    <h2>Customer Management</h2>

</header>

    <div class="toolbar">

        <input
            type="text"
            id="search"
            placeholder="Search Customer..."
        >

    </div>

    <table>

        <thead>

       <tr>

    <th>Customer ID</th>

    <th>Name</th>

    <th>Phone Number</th>

    <th>Access Code</th>

    <th>Account</th>

    <th>Balance</th>

    <th>Status</th>

    <th>Actions</th>

</tr>

        </thead>

        <tbody id="customerTable">

        </tbody>

    </table>

</div>

<script src="js/admin.js"></script>

</body>

</html>
