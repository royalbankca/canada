<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composant Caméra Générique</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7fa;
            margin: 0;
        }
        .camera-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        video {
            width: 100%;
            height: auto;
            border-radius: 8px;
            background-color: #222;
            transform: scaleX(-1); /* Effet miroir plus naturel */
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #0070ba;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0c2340; }
    </style>
</head>
<body>

<div class="camera-container">
    <h3>Vérification vidéo</h3>
    <p style="color: #555; font-size: 0.9rem;">Veuillez autoriser l'accès à votre caméra pour le test visuel.</p>
    
    <!-- Zone d'affichage du flux de la caméra -->
    <video id="webcam" autoplay playsinline></video>
    
    <button onclick="demarrerCamera()">Activer la caméra</button>
</div>

<script>
    async function demarrerCamera() {
        try {
            // Demande l'autorisation d'accéder à la webcam de l'appareil
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            const videoElement = document.getElementById('webcam');
            videoElement.srcObject = stream;
        } catch (error) {
            alert("Impossible d'accéder à la caméra : " + error.message);
        }
    }
</script>

</body>
</html>
