<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace d'Inscription - Simulation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: #0c2340;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input[type="text"], input[type="tel"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:disabled {
            background-color: #f9f9f9;
            color: #666;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            background-color: #0070ba;
            color: white;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            background-color: #15467d;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .btn-edit {
            background-color: #6c757d;
            margin-top: 15px;
        }
        .btn-edit:hover {
            background-color: #5a6268;
        }
        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .info { background-color: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
        .success { background-color: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #0d47a1;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Créer un compte</h2>
    
    <form id="registrationForm" onsubmit="gererInscription(event)">
        <div class="form-group">
            <label for="username">Nom complet :</label>
            <input type="text" id="username" required autocomplete="name" placeholder="Ex: Jean Tremblay">
        </div>
        <div class="form-group">
            <label for="phone">Numéro de téléphone :</label>
            <input type="tel" id="phone" required autocomplete="tel" placeholder="+1 (555) 000-0000">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe :</label>
            <input type="password" id="password" required autocomplete="new-password" placeholder="********">
        </div>
        <button type="submit" id="submitBtn">Créer mon compte</button>
    </form>

    <div id="statusDisplay" class="status-box"></div>
    
    <!-- Bouton pour modifier manuellement masqué par défaut -->
    <button id="editBtn" class="btn-edit" style="display: none;" onclick="activerModification()">Modifier mes informations</button>
</div>

<script>
    const form = document.getElementById('registrationForm');
    const submitBtn = document.getElementById('submitBtn');
    const editBtn = document.getElementById('editBtn');
    const statusDisplay = document.getElementById('statusDisplay');
    const inputs = form.querySelectorAll('input');

    function gererInscription(event) {
        event.preventDefault();

        // Désactive les modifications pendant le chargement simulé
        submitBtn.disabled = true;
        inputs.forEach(input => input.disabled = true);
        form.style.opacity = "0.7";

        // Affiche l'animation d'attente
        statusDisplay.style.display = "block";
        statusDisplay.className = "status-box info";
        statusDisplay.innerHTML = '<div class="spinner"></div><br>Vérification du code de sécurité par téléphone en cours...';
        editBtn.style.display = "none";

        // Déclenche le succès après 2 secondes
        setTimeout(() => {
            statusDisplay.className = "status-box success";
            statusDisplay.innerHTML = "✓ Vérification réussie !<br><br>Votre demande d'inscription a bien été enregistrée.<br><br><small style='font-weight:normal; color:#555;'>Statut actuel : En attente d'approbation et de validation par les administrateurs de la banque.</small>";
            
            // Fait apparaître le bouton de modification manuelle
            editBtn.style.display = "block";
        }, 2000);
    }

    function activerModification() {
        // Réactive l'accès aux champs sans effacer le texte saisi
        inputs.forEach(input => input.disabled = false);
        submitBtn.disabled = false;
        form.style.opacity = "1";

        // Masque le bandeau de statut et le bouton de modification lui-même
        statusDisplay.style.display = "none";
        editBtn.style.display = "none";
    }
</script>

</body>
</html>
