<!-- SCRIPT DE NAVIGATION ET INTÉGRATION TALLY -->
<script>
    // 1. CONFIGURATION DE VOS LIENS TALLY (Remplacez par vos vrais identifiants ou liens)
    // Si votre lien est https://tally.so, l'ID est "wA1234"
    const TALLY_ID_INSCRIPTION = 'VOTRE_ID_FORMULAIRE_INSCRIPTION'; 
    const TALLY_ID_CONNEXION = 'VOTRE_ID_FORMULAIRE_CONNEXION';

    // Fonction pour basculer d'un écran à l'ancre
    function basculerInterface(panel) {
        document.getElementById('panel-inscription').classList.remove('active');
        document.getElementById('panel-connexion').classList.remove('active');
        document.getElementById('panel-dashboard').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'none';

        if(panel === 'inscription') {
            document.getElementById('panel-inscription').classList.add('active');
        } else if(panel === 'connexion') {
            document.getElementById('panel-connexion').classList.add('active');
        } else if(panel === 'dashboard') {
            document.getElementById('panel-dashboard').style.display = 'grid';
            document.getElementById('logout-btn').style.display = 'block';
        }
    }

    // Ouvrir le formulaire d'inscription dans une fenêtre surgissante (Popup)
    function ouvrirInscriptionTally() {
        Tally.openPopup(TALLY_ID_INSCRIPTION, {
            layout: 'modal',
            width: 500,
            onSubmitted: (payload) => {
                alert("Inscription reçue ! Un administrateur va valider votre dossier.");
                basculerInterface('connexion');
            }
        });
    }

    // Ouvrir le formulaire de connexion/vérification
    function ouvrirConnexionTally() {
        Tally.openPopup(TALLY_ID_CONNEXION, {
            layout: 'modal',
            width: 500,
            onSubmitted: (payload) => {
                // Une fois le formulaire soumis, on redirige vers le tableau de bord
                basculerInterface('dashboard');
            }
        });
    }

    function deconnexionGlobal() {
        basculerInterface('connexion');
    }
</script>
